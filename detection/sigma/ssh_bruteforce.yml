title: SSH Brute Force / Password Guessing
id: 8f2c1a90-1d4e-4b7a-9c11-ssh-bruteforce-001
status: experimental
description: Detects repeated failed SSH authentication from a single source, indicative of brute force (MITRE T1110).
author: Muhammad Mahad (SafeX Solutions Blue Team, Group 17)
date: 2026-01-10
references:
  - https://attack.mitre.org/techniques/T1110/
logsource:
  product: linux
  service: sshd
detection:
  selection:
    - 'Failed password for'
    - 'Failed password for invalid user'
  timeframe: 5m
  condition: selection | count() by src_ip >= 5
fields:
  - src_ip
  - user
  - timestamp
falsepositives:
  - Misconfigured automation / expired credentials retrying
  - Users repeatedly mistyping passwords
level: high
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1110.001
